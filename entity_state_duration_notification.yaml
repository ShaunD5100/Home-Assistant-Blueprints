blueprint:
  name: Notify if entity stays in a chosen state for too long
  description: >
    Sends a notification if the selected entity remains in the chosen state
    (ON or OFF) for longer than the specified duration.
  domain: automation

  input:
    target_entity:
      name: Entity to monitor
      description: The entity that must stay in the chosen state.
      selector:
        entity: {}

    target_state:
      name: State to monitor
      description: Trigger when the entity stays in this state.
      default: "off"
      selector:
        select:
          options:
            - "off"
            - "on"

    duration:
      name: Duration the entity must stay in this state
      description: How long the entity must remain in the chosen state.
      default: "01:00:00"
      selector:
        duration: {}

    notify_service:
      name: Notification service
      description: The notify service to call (e.g. notify.mobile_app_phone).
      selector:
        text:

    message:
      name: Notification message
      description: Message to send when triggered.
      default: >
        {{ trigger.entity_id }} has been {{ target_state }} for over {{ duration }}.
      selector:
        text:

    restrict_time:
      name: Restrict to certain hours?
      description: Only send alerts during a specific time window.
      default: false
      selector:
        boolean: {}

    start_time:
      name: Start time
      description: Alerts allowed after this time.
      default: "00:00:00"
      selector:
        time: {}

    end_time:
      name: End time
      description: Alerts allowed before this time.
      default: "23:59:59"
      selector:
        time: {}

trigger:
  - platform: state
    entity_id: !input target_entity
    to: !input target_state
    for: !input duration

condition:
  - condition: or
    conditions:
      - condition: template
        value_template: "{{ not (restrict_time | default(false)) }}"
      - condition: time
        after: !input start_time
        before: !input end_time

action:
  - service: !input notify_service
    data:
      message: !input message

mode: single